<div class="login-container">
  
  <div class="login-header">
    <div class="logo-box">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
      </svg>
    </div>
    <h2>Hub de Estoque</h2>
    <p>Acesso restrito ao painel de controle</p>
  </div>

  <div class="login-card">
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" [(ngModel)]="email" placeholder="seu@email.com">
    </div>

    <div class="form-group">
      <label for="password">Senha</label>
      <input id="password" type="password" [(ngModel)]="password" placeholder="••••••••">
    </div>

    @if (errorMessage()) {
      <div class="error-message">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        {{ errorMessage() }}
      </div>
    }

    <button class="btn-primary" (click)="fazerLogin()" [disabled]="isLoading()">
      @if (isLoading()) {
        <svg class="spinner" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" fill="none" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>A autenticar...</span>
      } @else {
        <span>Entrar no Sistema</span>
      }
    </button>
  </div>

</div>
